services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bhavana_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bhavana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bhavana_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bhavana_studio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./apps/api/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bhavana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bhavana_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible) ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bhavana_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO bucket setup ────────────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: bhavana_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-bhavana-photos};
      mc anonymous set download local/${S3_BUCKET_NAME:-bhavana-photos};
      echo 'MinIO bucket ready';
      "

  # ─── API (Express) ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    container_name: bhavana_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bhavana}:${POSTGRES_PASSWORD:-bhavana_secret}@postgres:5432/${POSTGRES_DB:-bhavana_studio}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-bhavana-photos}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/bhavana-photos}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bhavanastudio.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      IMAGE_PROCESSING_URL: http://image-processing:5000
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4000:4000"

  # ─── Image Processing Service ──────────────────────────────────────────────
  image-processing:
    build:
      context: ./services/image-processing
      dockerfile: ../../infrastructure/docker/Dockerfile.image-processing
    container_name: bhavana_image_processing
    restart: unless-stopped
    environment:
      PORT: 5000
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-bhavana-photos}
      S3_REGION: ${S3_REGION:-us-east-1}
      THUMBNAIL_WIDTH: ${THUMBNAIL_WIDTH:-400}
      THUMBNAIL_HEIGHT: ${THUMBNAIL_HEIGHT:-300}
      PREVIEW_WIDTH: ${PREVIEW_WIDTH:-1200}
      PREVIEW_HEIGHT: ${PREVIEW_HEIGHT:-900}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "5000:5000"

  # ─── Web (Public Site) ─────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    container_name: bhavana_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "3000:3000"

  # ─── Client Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./apps/client-dashboard
      dockerfile: ../../infrastructure/docker/Dockerfile.dashboard
    container_name: bhavana_dashboard
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - "3001:3001"

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bhavana_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - dashboard
      - api
    ports:
      - "80:80"

  # ─── Adminer (DB GUI) ──────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bhavana_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
